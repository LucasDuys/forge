<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;
gsap.registerPlugin(ScrollTrigger, ScrollToPlugin);

const CHAPTERS = [
  'Forge','Brainstorm','Complexity','Capabilities','Planning','Three-Layer Loop',
  'Execution','Research','Stop Hook','Review','Circuit Breakers','Context Reset',
  'Token Budget','Verification','Backpropagation','Multi-Repo',
  'Streaming DAG','Artifact Contracts','Model Routing','Codex Hybrid',
  'Token-Saving Hooks','Re-Decomposition','Complete'
];

// ── Reusable hook: animate children with staggered delays on scroll ──
function useStagger(ref, selector, { delay = 0, stagger = 0.07, y = 24 } = {}) {
  useEffect(() => {
    if (!ref.current) return;
    const els = ref.current.querySelectorAll(selector);
    const ctx = gsap.context(() => {
      gsap.from(els, {
        opacity: 0, y, duration: 0.4, stagger, delay,
        ease: 'power2.out',
        scrollTrigger: { trigger: ref.current, start: 'top 80%', toggleActions: 'play none none none' },
      });
    }, ref);
    return () => ctx.revert();
  }, []);
}

// ── Section title ──
const Title = ({ children, sub }) => (
  <div className="s-title" style={{ marginBottom: 24 }}>
    <h2 style={{ fontFamily: 'Inter', fontWeight: 700, fontSize: 44, color: '#92400E', lineHeight: 1.1 }}>{children}</h2>
    {sub && <p style={{ fontFamily: 'JetBrains Mono', fontSize: 13, color: '#B8864A', marginTop: 4 }}>{sub}</p>}
  </div>
);

// ── Navigation ──
function Nav() {
  const [progress, setProgress] = useState(0);
  const [active, setActive] = useState(0);

  useEffect(() => {
    const onScroll = () => {
      const p = window.scrollY / (document.documentElement.scrollHeight - window.innerHeight);
      setProgress(p);
      const sections = document.querySelectorAll('.chapter');
      let cur = 0;
      sections.forEach((s, i) => { if (s.getBoundingClientRect().top <= window.innerHeight / 2) cur = i; });
      setActive(cur);
    };
    window.addEventListener('scroll', onScroll, { passive: true });
    return () => window.removeEventListener('scroll', onScroll);
  }, []);

  const go = useCallback((i) => {
    const el = document.querySelectorAll('.chapter')[i];
    if (el) gsap.to(window, { scrollTo: { y: el, offsetY: 0 }, duration: 0.5, ease: 'power2.inOut' });
  }, []);

  useEffect(() => {
    const onKey = (e) => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      if (e.code === 'ArrowDown' || e.code === 'ArrowRight') { e.preventDefault(); setActive(p => { const n = Math.min(p+1, CHAPTERS.length-1); go(n); return n; }); }
      if (e.code === 'ArrowUp' || e.code === 'ArrowLeft') { e.preventDefault(); setActive(p => { const n = Math.max(p-1, 0); go(n); return n; }); }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [go]);

  return (
    <div style={{ position:'fixed', top:0, left:0, width:'100%', height:'100%', zIndex:9999, pointerEvents:'none' }}>
      <div style={{ position:'absolute', top:0, left:0, width:'100%', height:3, background:'#E8D5BC' }}>
        <div style={{ height:'100%', width:`${progress*100}%`, background:'#F59E0B' }} />
      </div>
      <div style={{ position:'absolute', right:20, top:'50%', transform:'translateY(-50%)', display:'flex', flexDirection:'column', gap:8, alignItems:'center', pointerEvents:'auto' }}>
        {CHAPTERS.map((name, i) => (
          <button key={i} onClick={() => { go(i); setActive(i); }} title={name} style={{
            width: 8, height: 8, borderRadius: '50%', border: 'none', cursor: 'pointer', padding: 0,
            background: i === active ? '#F59E0B' : '#D4A574',
            boxShadow: i === active ? '0 0 6px rgba(245,158,11,0.5)' : 'none',
            transition: 'all 0.2s',
          }} />
        ))}
        <span style={{ fontFamily:'Inter', fontSize:11, color:'#92400E', marginTop:6 }}>{String(active+1).padStart(2,'0')} / {String(CHAPTERS.length).padStart(2,'0')}</span>
      </div>
    </div>
  );
}
